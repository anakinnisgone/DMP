appId: com.reaperguild.discordmanagerpanel
productName: Discord Manager Panel
directories:
  output: release
  buildResources: build
extraResources:
  - build/**/*

files:
  - dist/**/*
  - electron/**/*
  - build/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  certificateFile: null
  certificatePassword: null
  signingHashAlgorithms:
    - sha256

nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  artifactName: ${productName} Setup ${version}.exe
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  # Update ayarları - kurulumun sessiz çalışmasını sağlar
  differentialPackage: true
  deleteAppDataOnUninstall: false

portable:
  artifactName: DiscordManagerPanel-${version}-portable.exe

publish:
  provider: github
  owner: anakinnisgone
  repo: DMP
  releaseType: release

