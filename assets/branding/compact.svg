<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- DMP Compact Logo - Small UI/Header Use -->
  <defs>
    <linearGradient id="compactGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="compactGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Simplified Crown -->
  <g transform="translate(128, 50)">
    <circle cx="0" cy="0" r="2" fill="url(#compactGradient)" filter="url(#compactGlow)"/>
    <path d="M -4 3 L -2 0 L 0 5 L 2 0 L 4 3 L 2 7 L -2 7 Z" fill="url(#compactGradient)" filter="url(#compactGlow)"/>
  </g>

  <!-- Simplified Sword -->
  <g transform="translate(128, 70)">
    <!-- Quick hilt -->
    <circle cx="0" cy="20" r="2.5" fill="url(#compactGradient)" filter="url(#compactGlow)"/>
    <!-- Blade -->
    <path d="M -1.5 20 L 0 -5 L 1.5 20 Z" fill="url(#compactGradient)" stroke="url(#compactGradient)" stroke-width="0.5" filter="url(#compactGlow)"/>
  </g>

  <!-- DMP Text - Compact -->
  <text x="128" y="140" font-family="Arial, sans-serif" font-size="32" font-weight="bold"
        text-anchor="middle" fill="url(#compactGradient)" filter="url(#compactGlow)" letter-spacing="1">DMP</text>
</svg>