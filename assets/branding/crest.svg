<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- DMP Crest Logo - Main Brand Icon -->
  <defs>
    <linearGradient id="crestGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield Background -->
  <path d="M 128 20 L 200 60 L 200 140 C 200 190 128 230 128 230 C 128 230 56 190 56 140 L 56 60 Z"
        fill="url(#crestGradient)" stroke="#fff" stroke-width="2" filter="url(#glow)"/>

  <!-- Crown Top -->
  <g transform="translate(128, 45)">
    <circle cx="0" cy="0" r="4" fill="#fff" filter="url(#glow)"/>
    <path d="M -8 5 L -4 0 L 0 8 L 4 0 L 8 5 L 6 12 L -6 12 Z" fill="#fff" filter="url(#glow)"/>
  </g>

  <!-- Sword/Sword -->
  <g transform="translate(128, 60)">
    <!-- Hilt -->
    <circle cx="0" cy="35" r="5" fill="#fff" filter="url(#glow)"/>
    <rect x="-3" y="25" width="6" height="15" fill="#fff" filter="url(#glow)"/>

    <!-- Blade -->
    <path d="M -3 25 L -1 -15 L 0 -35 L 1 -15 L 3 25 Z" fill="#fff" stroke="#fff" stroke-width="0.5" filter="url(#glow)"/>
  </g>

  <!-- DMP Text in Shield -->
  <text x="128" y="155" font-family="Arial, sans-serif" font-size="42" font-weight="bold"
        text-anchor="middle" fill="#fff" filter="url(#glow)" letter-spacing="4">DMP</text>
</svg>