<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- DMP Signet Logo - Avatar/Circle Badge -->
  <defs>
    <linearGradient id="signetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="signetGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Circle -->
  <circle cx="128" cy="128" r="120" fill="url(#signetGradient)" stroke="#fff" stroke-width="2" filter="url(#signetGlow)"/>

  <!-- Inner Circle Border -->
  <circle cx="128" cy="128" r="115" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>

  <!-- Crown Top -->
  <g transform="translate(128, 70)">
    <circle cx="0" cy="0" r="3" fill="#fff" filter="url(#signetGlow)"/>
    <path d="M -6 4 L -3 0 L 0 6 L 3 0 L 6 4 L 4 9 L -4 9 Z" fill="#fff" filter="url(#signetGlow)"/>
  </g>

  <!-- Center Sword -->
  <g transform="translate(128, 85)">
    <!-- Hilt -->
    <circle cx="0" cy="30" r="4" fill="#fff" filter="url(#signetGlow)"/>
    <rect x="-2.5" y="22" width="5" height="12" fill="#fff" filter="url(#signetGlow)"/>

    <!-- Blade -->
    <path d="M -2.5 22 L -0.5 -8 L 0 -20 L 0.5 -8 L 2.5 22 Z" fill="#fff" stroke="#fff" stroke-width="0.5" filter="url(#signetGlow)"/>
  </g>

  <!-- DMP Text -->
  <text x="128" y="155" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
        text-anchor="middle" fill="#fff" filter="url(#signetGlow)" letter-spacing="2">DMP</text>
</svg>